server {
    listen 80;
    server_name _; # Accept any hostname/IP

    # Allow unlimited upload size (spec v1.0.6: no hard file size limit)
    client_max_body_size 0;

    # Increase proxy timeouts for long-running PDF conversions (default 600s + buffer)
    proxy_read_timeout 660s;
    proxy_send_timeout 660s;
    proxy_connect_timeout 60s;

    # Serve React static assets
    location / {
        root /media/data/git/doc2md/frontend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Repeat here to ensure it applies even if inherited value differs
        client_max_body_size 0;
        proxy_read_timeout 660s;
        proxy_send_timeout 660s;
    }

    # Proxy WebSocket requests
    location /api/v1/ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # Keep WS connection alive
    }
}
