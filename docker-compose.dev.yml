version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: doc2md-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doc2md}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doc2md_secret}
      POSTGRES_DB: ${POSTGRES_DB:-doc2md}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc2md"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doc2md-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
